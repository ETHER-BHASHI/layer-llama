<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layer Llama | 2026 Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-brown: #8d6e63;
            --accent-yellow: #fdd835;
            --bg-cream: #faf9f6;
            --text-dark: #4e342e;
            --insta-pink: #E1306C;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            padding-bottom: 120px;
        }

        /* --- Arched Retro Header --- */
        header {
            background: #fff;
            padding: 50px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-bottom: 5px solid var(--accent-yellow);
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 20px;
        }

        .logo-main {
            font-family: 'Shrikhand', cursive;
            font-size: clamp(2.5rem, 9vw, 4.5rem);
            color: var(--primary-brown);
            text-decoration: none;
            line-height: 1;
            text-shadow: 3px 3px 0px var(--accent-yellow);
        }

        .bulb { font-size: 3rem; }

        .slogan {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--primary-brown);
            text-transform: uppercase;
            margin-top: 15px;
        }

        /* --- Product Grid --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid #eee;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-yellow);
        }

        .img-box {
            width: 100%;
            height: 250px;
            border-radius: 25px;
            background: #fdfdfd;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .name {
            font-family: 'Shrikhand', cursive;
            font-size: 1.5rem;
            color: var(--primary-brown);
            margin-bottom: 10px;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2e7d32;
            display: block;
            margin-bottom: 20px;
        }

        .buy-btn {
            display: inline-block;
            background: var(--insta-pink);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
        }

        .insta-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            color: var(--insta-pink);
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 2px solid var(--insta-pink);
            z-index: 1000;
        }

        @media (max-width: 600px) {
            .insta-float { left: 20px; right: 20px; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <span class="bulb">💡</span>
        <a href="#" class="logo-main">Layer Llama</a>
        <span class="bulb">💡</span>
    </div>
    <span class="slogan">Ideate • Innovate • Invent</span>
</header>

<div class="container">
    <div class="product-grid">
        
        <div class="card">
            <div class="img-box">
                <img src="https://raw.githubusercontent.com/ETHER-BHASHI/layer-llama-assets/main/image.png" alt="Karambit">
            </div>
            <h2 class="name">Karambit Knife</h2>
            <span class="price">₹549</span>
            <a href="https://www.instagram.com/layerllama" target="_blank" class="buy-btn">DM TO ORDER</a>
        </div>

        <div class="card">
            <div class="img-box">
                <img src="https://raw.githubusercontent.com/ETHER-BHASHI/layer-llama-assets/main/Screenshot%202026-04-15%20153258.png" alt="Asimo Only">
            </div>
            <h2 class="name">Asimo Robot Only</h2>
            <span class="price">₹559</span>
            <a href="https://www.instagram.com/layerllama" target="_blank" class="buy-btn">DM TO ORDER</a>
        </div>

        <div class="card">
            <div class="img-box">
                <img src="https://raw.githubusercontent.com/ETHER-BHASHI/layer-llama-assets/main/photo_2026-04-15_15-05-56.jpg" alt="Octopus">
            </div>
            <h2 class="name">Flexii Octopus Cuteii</h2>
            <span class="price">₹599</span>
            <a href="https://www.instagram.com/layerllama" target="_blank" class="buy-btn">DM TO ORDER</a>
        </div>

        <div class="card">
            <div class="img-box">
                <img src="https://raw.githubusercontent.com/ETHER-BHASHI/layer-llama-assets/main/Screenshot%202026-04-15%20153339.png" alt="Asimo Full">
            </div>
            <h2 class="name">Asimo (Full + Bag)</h2>
            <span class="price">₹1099</span>
            <a href="https://www.instagram.com/layerllama" target="_blank" class="buy-btn">DM TO ORDER</a>
        </div>

        <div class="card">
            <div class="img-box">
                <img src="https://raw.githubusercontent.com/ETHER-BHASHI/layer-llama-assets/refs/heads/main/photo_2026-04-15_15-34-33.jpg" alt="Butterfly">
            </div>
            <h2 class="name">Butterfly Knife</h2>
            <span class="price">₹799</span>
            <a href="https://www.instagram.com/layerllama" target="_blank" class="buy-btn">DM TO ORDER</a>
        </div>

    </div>
</div>

<a href="https://www.instagram.com/layerllama" target="_blank" class="insta-float">
    CHAT ON INSTAGRAM
</a>

</body>
</html>
